<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAAR — Teste de Conversa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111417;
      color: #F5F7FA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: #1E2329;
      border-bottom: 1px solid #2a3140;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #2F6BFF;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-status {
      font-size: 13px;
      color: #22C55E;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .header-status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22C55E;
    }

    .header-badge {
      margin-left: auto;
      background: #2a3140;
      color: #A3ADB8;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 4px; }

    .msg {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-wrap;
      word-wrap: break-word;
      animation: fadeIn 0.25s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: #2F6BFF;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.assistant {
      align-self: flex-start;
      background: #1E2329;
      color: #F5F7FA;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a3140;
    }

    .msg.assistant strong { color: #5B8FFF; }
    .msg.assistant ul { margin: 6px 0 6px 18px; }
    .msg.assistant li { margin-bottom: 4px; }

    .msg-time {
      font-size: 11px;
      color: #A3ADB8;
      margin-top: 4px;
    }

    .msg.user .msg-time { text-align: right; color: rgba(255,255,255,0.6); }

    /* Typing */
    .typing {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 14px 20px;
      background: #1E2329;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      border: 1px solid #2a3140;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #A3ADB8;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    /* Input area */
    #input-area {
      background: #1E2329;
      border-top: 1px solid #2a3140;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: #111417;
      border: 1px solid #2a3140;
      border-radius: 12px;
      padding: 12px 16px;
      color: #F5F7FA;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }

    #user-input::placeholder { color: #A3ADB8; }
    #user-input:focus { border-color: #2F6BFF; }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #2F6BFF;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
    }

    #send-btn:hover { background: #4a80ff; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { width: 20px; height: 20px; fill: white; }

    /* Quick actions */
    #quick-actions {
      display: flex;
      gap: 8px;
      padding: 0 24px 12px;
      background: #1E2329;
      flex-wrap: wrap;
    }

    .quick-btn {
      background: #111417;
      border: 1px solid #2a3140;
      color: #A3ADB8;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .quick-btn:hover {
      border-color: #2F6BFF;
      color: #F5F7FA;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 8px;
      font-size: 11px;
      color: #555;
      background: #111417;
    }

    footer a { color: #2F6BFF; text-decoration: none; }

    /* Responsive */
    @media (max-width: 600px) {
      .msg { max-width: 90%; }
      .header-badge { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">C</div>
    <div class="header-info">
      <h1>CAAR — Pitcore & Systems</h1>
      <div class="header-status">Online</div>
    </div>
    <span class="header-badge">Claude Sonnet 4.6</span>
  </header>

  <div id="messages"></div>

  <div id="quick-actions">
    <button class="quick-btn" onclick="sendQuick(this)">Quero conhecer os agentes de IA</button>
    <button class="quick-btn" onclick="sendQuick(this)">Quanto custa?</button>
    <button class="quick-btn" onclick="sendQuick(this)">Como funciona a demo gratuita?</button>
    <button class="quick-btn" onclick="sendQuick(this)">Quero um sistema sob medida</button>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="Digite sua mensagem..." rows="1"></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>

  <footer>Powered by <a href="https://pitcore.online" target="_blank">Pitcore & Systems</a></footer>

  <script>
    const API_URL = "http://localhost:8001/api";
    const WS_URL = "ws://localhost:8001/api";
    const convId = "test_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 6);

    let ws = null;
    let sending = false;

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // --- WebSocket ---
    function connectWS() {
      ws = new WebSocket(WS_URL + "/chat/ws/" + convId);
      ws.onopen = () => console.log("WS connected");
      ws.onmessage = (e) => {
        hideTyping();
        try {
          const data = JSON.parse(e.data);
          addMessage("assistant", data.message);
        } catch { addMessage("assistant", e.data); }
        sending = false;
        sendBtn.disabled = false;
      };
      ws.onclose = () => { ws = null; };
      ws.onerror = () => { ws = null; };
    }

    // --- REST fallback ---
    async function sendREST(text) {
      try {
        const res = await fetch(API_URL + "/chat/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ conversation_id: convId, message: text, channel: "website" }),
        });
        const data = await res.json();
        hideTyping();
        addMessage("assistant", data.message);
      } catch (err) {
        hideTyping();
        addMessage("assistant", "Erro de conexao. Verifique se o servidor esta rodando em localhost:8000.");
        console.error(err);
      }
      sending = false;
      sendBtn.disabled = false;
    }

    // --- Send ---
    function send() {
      const text = inputEl.value.trim();
      if (!text || sending) return;

      sending = true;
      sendBtn.disabled = true;

      addMessage("user", text);
      inputEl.value = "";
      inputEl.style.height = "auto";
      showTyping();

      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ message: text }));
      } else {
        sendREST(text);
      }
    }

    function sendQuick(btn) {
      inputEl.value = btn.textContent;
      send();
    }

    // --- UI ---
    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;

      let formatted = escapeHtml(text);
      formatted = formatted.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
      formatted = formatted.replace(/^[-•]\s+(.+)$/gm, "<li>$1</li>");
      if (formatted.includes("<li>")) {
        formatted = formatted.replace(/(<li>[\s\S]*?<\/li>)/g, "<ul>$1</ul>");
        formatted = formatted.replace(/<\/ul>\s*<ul>/g, "");
      }

      const time = new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
      div.innerHTML = formatted + '<div class="msg-time">' + time + '</div>';
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      if (messagesEl.querySelector(".typing")) return;
      const div = document.createElement("div");
      div.className = "typing";
      div.innerHTML = "<span></span><span></span><span></span>";
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function hideTyping() {
      const t = messagesEl.querySelector(".typing");
      if (t) t.remove();
    }

    function escapeHtml(text) {
      const d = document.createElement("div");
      d.textContent = text;
      return d.innerHTML;
    }

    // Auto-resize
    inputEl.addEventListener("input", function () {
      this.style.height = "auto";
      this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });

    // Enter to send
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
    });

    sendBtn.addEventListener("click", send);

    // Init
    connectWS();
    addMessage("assistant", "Ola! Sou a **CAAR**, consultora virtual da **Pitcore & Systems**. Como posso ajudar seu centro automotivo hoje?");
    inputEl.focus();
  </script>
</body>
</html>
