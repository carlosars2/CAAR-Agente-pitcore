version: "3.8"

services:
  pitcore-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pitcore-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    networks:
      - pitcore-network

networks:
  pitcore-network:
    external: true
    name: pitcore_default
