version: "3.8"

services:
  caar-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: caar-agent
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    networks:
      - pitcore-network
    depends_on:
      - evolution-api

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: caar-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://pitcore:${DB_PASSWORD:-pitcore_dev_2024}@pitcore-postgres:5432/evolution
      - REDIS_ENABLED=true
      - REDIS_URI=redis://pitcore-redis:6379/2
    networks:
      - pitcore-network

networks:
  pitcore-network:
    external: true
    name: pitcore_default
